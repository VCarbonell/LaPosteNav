<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#FFCD00" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>LaPosteNav</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">

      <!-- ===== VUE LISTE ===== -->
      <div id="view-list">
        <header>
          <h1>Tournée</h1>
          <div class="header-actions">
            <button id="btn-add" type="button">+ Voie</button>
            <button id="btn-reset" type="button" title="Réinitialiser la liste">↺</button>
            <button id="btn-trace" type="button" title="Calculer et afficher l'itinéraire">Tracer ▶</button>
          </div>
        </header>
        <main id="list-container"></main>
      </div>

      <!-- ===== VUE CARTE ===== -->
      <div id="view-map" class="hidden">
        <header class="header-map">
          <button id="btn-back" type="button">← Liste</button>
          <span id="map-title">Itinéraire</span>
          <button id="btn-settings" type="button" title="Réglages">⚙</button>
        </header>
        <div id="map-wrap">
          <div id="map-container"></div>

          <!-- Flèche "moi" — centrée, visible uniquement en mode nav + suivi actif -->
          <div id="me-arrow" class="me-arrow hidden" aria-hidden="true">
            <svg width="36" height="44" viewBox="0 0 36 44" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M18 3 L32 40 L18 30 L4 40 Z" fill="#2563eb" stroke="white" stroke-width="3" stroke-linejoin="round"/>
            </svg>
          </div>

          <!-- Bouton recentrer — visible en nav quand le suivi est désactivé -->
          <button id="btn-follow" class="btn-follow hidden" type="button">⊙ Recentrer</button>

          <!-- Barre de boutons bas de carte -->
          <div class="map-bottom-bar">
            <button id="btn-retrace" type="button">↺ Recalculer</button>
            <button id="btn-nav" type="button">▶ Conduire</button>
          </div>
        </div>
      </div>

    </div>

    <!-- ===== Overlay chargement ===== -->
    <div id="loading-overlay" class="hidden">
      <div class="loading-box">
        <div class="loading-spinner"></div>
        <p id="loading-text">Calcul en cours…</p>
      </div>
    </div>

    <!-- ===== Modal déplacer une voie ===== -->
    <div id="move-modal" class="modal hidden" role="dialog" aria-modal="true" aria-label="Déplacer la voie">
      <div class="modal-overlay" id="move-modal-overlay"></div>
      <div class="modal-sheet">
        <div class="modal-header">
          <h2>Placer après…</h2>
          <button id="move-modal-close" type="button" aria-label="Fermer">✕</button>
        </div>
        <p id="move-modal-info"></p>
        <div class="modal-body" id="move-modal-list"></div>
        <div class="modal-footer">
          <button id="move-modal-apply" type="button">Déplacer</button>
        </div>
      </div>
    </div>

    <!-- ===== Modal copie commune/CP ===== -->
    <div id="copy-modal" class="modal hidden" role="dialog" aria-modal="true" aria-label="Appliquer commune et CP">
      <div class="modal-overlay" id="modal-overlay"></div>
      <div class="modal-sheet">
        <div class="modal-header">
          <h2>Appliquer commune / CP</h2>
          <button id="modal-close" type="button" aria-label="Fermer">✕</button>
        </div>
        <p id="modal-info"></p>
        <div class="modal-body" id="modal-list"></div>
        <div class="modal-footer">
          <button id="modal-select-empty" type="button">Sélect. vides</button>
          <button id="modal-apply" type="button">Appliquer</button>
        </div>
      </div>
    </div>

    <!-- ===== Modal réglages ===== -->
    <div id="settings-modal" class="modal hidden" role="dialog" aria-modal="true" aria-label="Réglages">
      <div class="modal-overlay" id="settings-overlay"></div>
      <div class="modal-sheet">
        <div class="modal-header">
          <h2>Réglages</h2>
          <button id="settings-close" type="button" aria-label="Fermer">✕</button>
        </div>
        <div class="modal-body settings-body">
          <label class="settings-label">
            <div class="settings-label-title">Inclinaison carte (<span id="pitch-value">50</span>°)</div>
            <input type="range" id="pitch-slider" min="0" max="60" step="5" value="50" />
            <div class="settings-range-hints"><span>0° (dessus)</span><span>60° (nav)</span></div>
          </label>
          <div class="settings-label-title">Mode de déplacement</div>
          <div class="settings-radio-group">
            <label class="settings-radio-label">
              <input type="radio" name="transport-mode" value="driving-car" checked />
              Voiture
            </label>
            <label class="settings-radio-label">
              <input type="radio" name="transport-mode" value="cycling-regular" />
              Vélo
            </label>
            <label class="settings-radio-label">
              <input type="radio" name="transport-mode" value="foot-walking" />
              À pied
            </label>
          </div>
        </div>
      </div>
    </div>

    <!-- ===== Modal coordonnées GPS ===== -->
    <div id="gps-modal" class="modal hidden" role="dialog" aria-modal="true" aria-label="Coordonnées GPS manuelles">
      <div class="modal-overlay" id="gps-modal-overlay"></div>
      <div class="modal-sheet">
        <div class="modal-header">
          <h2>Coordonnées GPS</h2>
          <button id="gps-modal-close" type="button" aria-label="Fermer">✕</button>
        </div>
        <div class="modal-body gps-modal-body">
          <p id="gps-modal-info" class="gps-modal-info"></p>
          <div id="gps-current" class="gps-current hidden"></div>
          <button id="gps-btn-position" type="button" class="gps-btn-full">📍 Ma position actuelle</button>
          <div class="gps-divider">ou saisir manuellement</div>
          <input id="gps-input" type="text" class="gps-input" placeholder="48.8566, 2.3522" inputmode="decimal" autocomplete="off" />
        </div>
        <div class="modal-footer">
          <button id="gps-btn-clear" type="button" class="gps-btn-clear hidden">Supprimer coords</button>
          <button id="gps-btn-save" type="button" class="gps-btn-save">Enregistrer</button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
